<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="768" viewBox="0 0 1600 768" role="img" aria-labelledby="title desc">
<title id="title">Hub Criativo - Um espaço para mentes curiosas</title>
<desc id="desc">Mapa visual do Hub Criativo com textura sutil, áreas de conhecimento e chamada para mentes curiosas.</desc>
<defs>
<radialGradient id="bgLeft" cx="34%" cy="48%" r="52%"><stop offset="0" stop-color="#171A22" stop-opacity="0.92"/><stop offset="0.62" stop-color="#07080A" stop-opacity="0.97"/><stop offset="1" stop-color="#000000"/></radialGradient>
<radialGradient id="bgRight" cx="76%" cy="42%" r="42%"><stop offset="0" stop-color="#15161B" stop-opacity="0.9"/><stop offset="0.7" stop-color="#050506" stop-opacity="0.97"/><stop offset="1" stop-color="#000000"/></radialGradient>
<radialGradient id="blueGlow" cx="32%" cy="52%" r="18%"><stop offset="0" stop-color="#2563EB" stop-opacity="0.25"/><stop offset="1" stop-color="#2563EB" stop-opacity="0"/></radialGradient>
<pattern id="softDots" width="52" height="52" patternUnits="userSpaceOnUse"><circle cx="8" cy="10" r="1.25" fill="#D1D5DB" opacity="0.18"/><circle cx="31" cy="22" r="0.95" fill="#D1D5DB" opacity="0.12"/><circle cx="46" cy="42" r="1.15" fill="#D1D5DB" opacity="0.14"/></pattern>
<radialGradient id="dotFade" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/><stop offset="0.58" stop-color="#FFFFFF" stop-opacity="0.34"/><stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
<mask id="dotMask"><rect width="920" height="768" fill="url(#dotFade)"/></mask>
<filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="8"/></filter>
</defs>
<rect width="1600" height="768" rx="36" fill="#000"/><rect width="1600" height="768" rx="36" fill="url(#bgLeft)"/><rect width="1600" height="768" rx="36" fill="url(#bgRight)"/><circle cx="500" cy="390" r="235" fill="url(#blueGlow)" filter="url(#softBlur)"/><rect x="20" y="0" width="900" height="768" fill="url(#softDots)" opacity="0.45" mask="url(#dotMask)"/>
<g stroke="#F8FAFC" stroke-opacity="0.31" fill="none"><circle cx="500" cy="390" r="120" stroke-width="2"/><circle cx="500" cy="390" r="190" stroke-width="2"/><circle cx="500" cy="390" r="250" stroke-width="1.4" opacity="0.72"/><line x1="500" y1="140" x2="500" y2="640"/><line x1="250" y1="390" x2="750" y2="390"/><line x1="323" y1="213" x2="677" y2="567" opacity="0.52"/><line x1="677" y1="213" x2="323" y2="567" opacity="0.52"/></g>
<g font-family="Arial, Helvetica, sans-serif"><text x="500" y="88" text-anchor="middle" font-size="18" font-weight="700" fill="#F8FAFC">Production</text><text x="500" y="118" text-anchor="middle" font-size="14" fill="#8B949E">Make</text><text x="675" y="158" text-anchor="start" font-size="18" font-weight="700" fill="#F8FAFC">Implementation</text><text x="675" y="188" text-anchor="start" font-size="14" fill="#8B949E">Build</text><text x="820" y="388" text-anchor="start" font-size="18" font-weight="700" fill="#F8FAFC">Knowledge</text><text x="820" y="418" text-anchor="start" font-size="14" fill="#8B949E">Know</text><text x="680" y="650" text-anchor="start" font-size="18" font-weight="700" fill="#F8FAFC">Impact</text><text x="680" y="680" text-anchor="start" font-size="14" fill="#8B949E">Matter</text><text x="500" y="720" text-anchor="middle" font-size="18" font-weight="700" fill="#F8FAFC">Perception</text><text x="500" y="750" text-anchor="middle" font-size="14" fill="#8B949E">Observe</text><text x="292" y="650" text-anchor="end" font-size="18" font-weight="700" fill="#F8FAFC">Expression</text><text x="292" y="680" text-anchor="end" font-size="14" fill="#8B949E">Express</text><text x="130" y="388" text-anchor="end" font-size="18" font-weight="700" fill="#F8FAFC">Behavior</text><text x="130" y="418" text-anchor="end" font-size="14" fill="#8B949E">Act</text><text x="305" y="158" text-anchor="end" font-size="18" font-weight="700" fill="#F8FAFC">Inquiry</text><text x="305" y="188" text-anchor="end" font-size="14" fill="#8B949E">Verify</text><text x="500" y="326" text-anchor="middle" font-size="18" font-weight="700" fill="#F8FAFC">Philosophy</text><text x="500" y="354" text-anchor="middle" font-size="13" fill="#8B949E">Why?</text><text x="592" y="303" text-anchor="middle" font-size="18" font-weight="700" fill="#F8FAFC">Science</text><text x="585" y="535" text-anchor="middle" font-size="18" font-weight="700" fill="#F8FAFC">Engineering</text><text x="500" y="505" text-anchor="middle" font-size="18" font-weight="700" fill="#F8FAFC">Economy</text><text x="500" y="533" text-anchor="middle" font-size="13" fill="#8B949E">For what?</text><text x="405" y="535" text-anchor="middle" font-size="18" font-weight="700" fill="#F8FAFC">Design</text><text x="410" y="303" text-anchor="middle" font-size="18" font-weight="700" fill="#F8FAFC">Art</text></g>
<g><circle cx="500" cy="390" r="42" fill="#07080B" stroke="#2563EB" stroke-width="4"/><circle cx="500" cy="390" r="60" fill="none" stroke="#2563EB" stroke-opacity="0.20" stroke-width="10"/><text x="500" y="399" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" fill="#FFFFFF">LH</text></g>
<g transform="translate(930 150)" font-family="Arial, Helvetica, sans-serif"><text x="0" y="0" font-size="18" font-weight="700" fill="#3B82F6" letter-spacing="9">HUB CRIATIVO</text><text x="0" y="104" font-size="66" font-weight="800" fill="#FFFFFF">Um espaço para</text><text x="0" y="190" font-size="66" font-weight="800" fill="#FFFFFF">mentes curiosas.</text><text x="0" y="274" font-size="25" fill="#A7A7AA">Para pessoas com múltiplos interesses, mentes inquietas e</text><text x="0" y="316" font-size="25" fill="#A7A7AA">vontade de conectar ideias.</text><text x="0" y="396" font-size="25" fill="#A7A7AA">Aqui, reunimos quem valoriza boas conversas, troca de</text><text x="0" y="438" font-size="25" fill="#A7A7AA">repertórios e boas companhias para pensar, criar e</text><text x="0" y="480" font-size="25" fill="#A7A7AA">compartilhar os desafios da vida.</text></g>
</svg>
